<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Fix My Device device diagnostics dashboard.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Fix My Device">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Fix My Device</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      color-scheme: light;
      --page-bg: #f3f6fa;
      --card-bg: #ffffff;
      --text: #111827;
      --muted: #4b5563;
      --brand: #2166ac;
      --selection: rgba(33, 102, 172, 0.2);
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--page-bg);
      color: var(--text);
      font-family: Segoe UI, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
    }

    #app-loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: var(--page-bg);
      z-index: 9999;
      transition: opacity 180ms ease;
    }

    #app-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-card {
      width: min(420px, calc(100vw - 32px));
      background: var(--card-bg);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
    }

    .loader-title {
      margin: 0 0 10px;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
    }

    .loader-copy {
      margin: 0;
      line-height: 1.5;
      color: var(--muted);
    }

    .loader-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 22px;
      color: var(--brand);
      font-weight: 600;
    }

    .loader-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--brand);
      box-shadow: 0 0 0 0 rgba(33, 102, 172, 0.25);
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(33, 102, 172, 0.25); }
      100% { box-shadow: 0 0 0 14px rgba(33, 102, 172, 0); }
    }

    input,
    textarea,
    flt-glass-pane input,
    flt-glass-pane textarea,
    .flt-text-editing-host input,
    .flt-text-editing-host textarea {
      color: #111827 !important;
      caret-color: var(--brand) !important;
      background-color: #ffffff !important;
      -webkit-text-fill-color: #111827 !important;
    }

    input::selection,
    textarea::selection,
    flt-glass-pane input::selection,
    flt-glass-pane textarea::selection,
    .flt-text-editing-host input::selection,
    .flt-text-editing-host textarea::selection {
      background: var(--selection) !important;
      color: #111827 !important;
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    textarea:-webkit-autofill,
    textarea:-webkit-autofill:hover,
    textarea:-webkit-autofill:focus,
    flt-glass-pane input:-webkit-autofill,
    flt-glass-pane input:-webkit-autofill:hover,
    flt-glass-pane input:-webkit-autofill:focus,
    flt-glass-pane textarea:-webkit-autofill,
    flt-glass-pane textarea:-webkit-autofill:hover,
    flt-glass-pane textarea:-webkit-autofill:focus,
    .flt-text-editing-host input:-webkit-autofill,
    .flt-text-editing-host input:-webkit-autofill:hover,
    .flt-text-editing-host input:-webkit-autofill:focus,
    .flt-text-editing-host textarea:-webkit-autofill,
    .flt-text-editing-host textarea:-webkit-autofill:hover,
    .flt-text-editing-host textarea:-webkit-autofill:focus {
      -webkit-text-fill-color: #111827 !important;
      caret-color: var(--brand) !important;
      -webkit-box-shadow: 0 0 0 1000px #ffffff inset !important;
      box-shadow: 0 0 0 1000px #ffffff inset !important;
      transition: background-color 99999s ease-out 0s;
    }
  </style>
</head>
<body>
  <div id="app-loader">
    <div class="loader-card">
      <h1 class="loader-title">Fix My Device</h1>
      <p class="loader-copy">
        Loading your device dashboard. If this takes longer than expected, refresh the page once.
      </p>
      <div class="loader-row">
        <span class="loader-dot"></span>
        <span>Starting app...</span>
      </div>
    </div>
  </div>

  <noscript>
    <div style="padding:24px;color:#111827;font-family:Segoe UI,Arial,sans-serif;">
      JavaScript is required to run Fix My Device.
    </div>
  </noscript>

  <script>
    const hideLoader = () => {
      const loader = document.getElementById('app-loader');
      if (!loader) {
        return;
      }
      loader.classList.add('hidden');
      setTimeout(() => loader.remove(), 220);
    };

    window.addEventListener('flutter-first-frame', hideLoader);

    const observer = new MutationObserver(() => {
      if (document.querySelector('flt-glass-pane, flutter-view')) {
        hideLoader();
        observer.disconnect();
      }
    });

    observer.observe(document.body, { childList: true, subtree: true });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
