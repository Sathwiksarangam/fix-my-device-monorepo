<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="fix_my_device">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>fix_my_device</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      background: #f3f6fa;
    }

    input,
    textarea,
    flt-glass-pane input,
    flt-glass-pane textarea,
    .flt-text-editing-host input,
    .flt-text-editing-host textarea {
      color: #111827 !important;
      caret-color: #2166ac !important;
      background-color: #ffffff !important;
      -webkit-text-fill-color: #111827 !important;
    }

    input::selection,
    textarea::selection,
    flt-glass-pane input::selection,
    flt-glass-pane textarea::selection,
    .flt-text-editing-host input::selection,
    .flt-text-editing-host textarea::selection {
      background: rgba(33, 102, 172, 0.2) !important;
      color: #111827 !important;
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    textarea:-webkit-autofill,
    textarea:-webkit-autofill:hover,
    textarea:-webkit-autofill:focus,
    flt-glass-pane input:-webkit-autofill,
    flt-glass-pane input:-webkit-autofill:hover,
    flt-glass-pane input:-webkit-autofill:focus,
    flt-glass-pane textarea:-webkit-autofill,
    flt-glass-pane textarea:-webkit-autofill:hover,
    flt-glass-pane textarea:-webkit-autofill:focus,
    .flt-text-editing-host input:-webkit-autofill,
    .flt-text-editing-host input:-webkit-autofill:hover,
    .flt-text-editing-host input:-webkit-autofill:focus,
    .flt-text-editing-host textarea:-webkit-autofill,
    .flt-text-editing-host textarea:-webkit-autofill:hover,
    .flt-text-editing-host textarea:-webkit-autofill:focus {
      -webkit-text-fill-color: #111827 !important;
      caret-color: #2166ac !important;
      -webkit-box-shadow: 0 0 0 1000px #ffffff inset !important;
      box-shadow: 0 0 0 1000px #ffffff inset !important;
      transition: background-color 99999s ease-out 0s;
    }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
